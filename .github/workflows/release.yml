name: Publish Release

on:
  workflow_dispatch:
  release:
    types:
      - published

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  Build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 21
      - name: Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            .gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', 'build.gradle') }}
      - name: Validate Gradle wrapper
        id: wrapper_validation
        uses: gradle/actions/wrapper-validation@v3
        continue-on-error: true
      - name: Warn if wrapper validation failed
        if: steps.wrapper_validation.outcome == 'failure'
        run: echo "::warning::Gradle wrapper validation failed due to transient network issues; continuing release build."
      - run: |
          chmod +x gradlew
          ./gradlew build publishMod --stacktrace -Porg.gradle.parallel.threads=4
        timeout-minutes: 30